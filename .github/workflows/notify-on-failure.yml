name: Notify on Workflow Failure

on:
  workflow_run:
    workflows:
      - "Build and Push Docker Image"
      - "Check for opencode updates"
    types:
      - completed

permissions:
  issues: write

jobs:
  notify:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-failure --repo ${{ github.repository }} \
            --color d73a4a \
            --description "Automated: a GitHub Actions workflow run failed" \
            --force

      - name: Check for existing open issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="CI failure: ${{ github.event.workflow_run.name }}"
          COUNT=$(gh issue list --repo ${{ github.repository }} \
            --label ci-failure --state open \
            --search "\"$TITLE\" in:title" --json number --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Open issue
        if: steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --repo ${{ github.repository }} \
            --title "CI failure: ${{ github.event.workflow_run.name }}" \
            --label ci-failure \
            --body "The **${{ github.event.workflow_run.name }}** workflow failed on \`${{ github.event.workflow_run.head_branch }}\`.

          Run: ${{ github.event.workflow_run.html_url }}"
