name: Check for opencode updates

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run version updater
        id: update
        run: |
          python3 update_versions.py
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if versions changed
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump opencode-ai and @openchamber/web to latest"
          title: "chore: bump opencode package versions"
          branch: "auto/bump-opencode-versions"
          delete-branch: true
